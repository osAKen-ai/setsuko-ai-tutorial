<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成AIチュートリアル｜セッション一覧</title>
<style>
:root {
  --teal: #1a5c5c;
  --teal-light: #2a7a7a;
  --teal-bg: #e8f4f4;
  --white: #ffffff;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-500: #adb5bd;
  --gray-700: #495057;
  --gray-800: #343a40;
  --gray-900: #212529;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
  background: var(--gray-100);
  color: var(--gray-900);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}

.header {
  background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
  color: var(--white);
  padding: 3rem 1rem 2.5rem;
  text-align: center;
}
.header h1 {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}
.header .subtitle {
  font-size: 1rem;
  opacity: 0.85;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1rem 3rem;
}

.section-title {
  font-size: 1.2rem;
  color: var(--gray-700);
  margin-bottom: 1.5rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--teal-bg);
}

.session-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2rem;
}

.session-card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  padding: 1.8rem;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s, box-shadow 0.2s;
  display: block;
  border: 2px solid transparent;
}
.session-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  border-color: var(--teal-light);
}

.session-number {
  display: inline-block;
  background: var(--teal);
  color: var(--white);
  width: 2.5rem;
  height: 2.5rem;
  line-height: 2.5rem;
  text-align: center;
  border-radius: 50%;
  font-weight: 700;
  font-size: 1.2rem;
  margin-bottom: 0.8rem;
}

.session-card h2 {
  font-size: 1.15rem;
  color: var(--gray-800);
  margin-bottom: 0.5rem;
}

.session-date {
  font-size: 0.9rem;
  color: var(--gray-500);
  margin-bottom: 0.8rem;
}

.session-topics {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.topic-tag {
  display: inline-block;
  background: var(--teal-bg);
  color: var(--teal);
  font-size: 0.78rem;
  padding: 0.15rem 0.6rem;
  border-radius: 12px;
  font-weight: 500;
}

.footer {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--gray-500);
  font-size: 0.85rem;
}

@media (max-width: 640px) {
  .header h1 { font-size: 1.5rem; }
  .session-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>生成AIチュートリアル</h1>
  <div class="subtitle">医療法人かがやき &mdash; 節子さん・藤井院長 &times; 長田 &mdash; セッション議事録アーカイブ</div>
</div>

<div class="container">
  <div class="section-title">セッション一覧</div>

  <div class="session-grid">

    <a class="session-card" href="第1回生成AIチュートリアル.html">
      <div class="session-number">1</div>
      <h2>第1回 生成AIチュートリアル</h2>
      <div class="session-date">2026年5月26日（火）13:59〜15:24 オンライン（Zoom）</div>
      <div class="session-topics">
        <span class="topic-tag">AIは新人</span>
        <span class="topic-tag">3つの脳</span>
        <span class="topic-tag">MVP・フローチャート</span>
        <span class="topic-tag">セカンドオピニオン</span>
        <span class="topic-tag">医療の個人情報は専門家へ</span>
        <span class="topic-tag">小児ワクチン管理</span>
        <span class="topic-tag">在宅物品管理</span>
      </div>
    </a>

  </div>
</div>

<div class="footer">
  生成AIチュートリアル｜医療法人かがやき &mdash; Generated with Claudian
</div>

</body>
</html>
